# 松灵智导 RANGER API 配置
# 复制 config/local.yaml.example 为 config/local.yaml 并填入真实凭据

chassis:
  host: "10.7.5.99"
  ssh_user: ""   # 底盘 SSH 用户名，见 local.yaml
  http_base: "http://10.7.5.99"
  ws_base: "ws://10.7.5.99:6060"

auth:
  username: ""   # API 登录用户名，见 local.yaml
  password: ""   # API 登录密码，见 local.yaml

debug_site:
  map_name: "hacthon_hall"
  map_width: 1210
  map_height: 1240
  rviz_zoom_factor: 1.25   # >1 放大地图显示（默认在能看全图基础上放大 25%）
  output_dir: "data/maps/hacthon_hall"
  frame_id: "agilex_map"

ros2:
  domain_id: 15
  pose_topic: "/agilex/pose"
  pose_rviz_topic: "/agilex/pose_rviz"
  init_pose_preview_topic: "/agilex/init_pose_preview"
  initial_pose_topic: "/initialpose"
  map_topic: "/agilex/map"
  map_image_topic: "/agilex/map_image"
  laser_map_topic: "/agilex/laser_map"
  service_prefix: "/agilex"

visualization:
  laser_enabled: true
  laser_sources:
    - "/real_time_laser/front"
    - "/real_time_laser/back"
  laser_publish_hz: 0.5          # RViz 发布频率，底盘 WS 原生约 1Hz
  laser_accumulate: false        # true=叠加最近若干帧；false=仅当前帧（推荐定位预览）
  laser_accumulate_max_scans: 6  # accumulate=true 时保留帧数（约 12s @0.5Hz）

web:
  host: "0.0.0.0"
  port: 8765

network:
  http_timeout_sec: 30
  ws_timeout_sec: 10
  mapping_timeout_sec: 180
  localization_timeout_sec: 60

agent:
  # 具身 Agent 通过 get-map 写入的固定缓存（相对项目根目录）
  map_cache_dir: "data/agent_cache/current_map"
